version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: artifactforge-db
    environment:
      POSTGRES_USER: artifactforge
      POSTGRES_PASSWORD: artifactforge
      POSTGRES_DB: artifactforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifactforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: artifactforge-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - debug

volumes:
  postgres_data:
    name: artifactforge-postgres-data

networks:
  default:
    name: artifactforge-network
